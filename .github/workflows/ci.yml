name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cargo build

  smoke:
    name: Smoke tests
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Debug smoke tests
        run: cargo test --test smoke -- --test-threads=1
      - name: Release smoke tests
        run: cargo test --release --test smoke -- --test-threads=1

  test-suite:
    name: redo test suite
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Set up test helpers
        run: |
          mkdir -p redo
          ln -sf /bin/sh redo/sh
          printf '#!/bin/sh\nexec python3 "$@"\n' > redo/py
          chmod +x redo/py
          echo '#!/usr/bin/env python3' > t/flush-cache
          cat t/flush-cache.in >> t/flush-cache
          chmod +x t/flush-cache
          # Verify helpers exist
          test -x redo/py && echo "redo/py OK" || echo "redo/py MISSING"
          test -x t/flush-cache && echo "flush-cache OK" || echo "flush-cache MISSING"
          head -1 t/flush-cache
      - name: Run test suite
        run: |
          export PATH="$PWD/target/release:$PATH"
          export REDO_LOG=0
          PASS=0; FAIL=0; SKIP=0; TOTAL=0; FAILURES=""
          for d in t/[0-9s][0-9][0-9]*/; do
            test_name=$(basename "$d")
            TOTAL=$((TOTAL+1))
            case "$test_name" in 110-*|111-*|999-*) echo "  SKIP: $test_name"; SKIP=$((SKIP+1)); continue;; esac
            printf "  %-30s " "$test_name"
            cd "$d"; rm -rf ../../.redo
            if timeout 60 redo all >/dev/null 2>/tmp/redo-test-err; then
              echo "ok"
              PASS=$((PASS+1))
            else
              echo "FAIL"
              FAIL=$((FAIL+1))
              FAILURES="$FAILURES $test_name"
              echo "    stderr: $(head -5 /tmp/redo-test-err)"
            fi
            cd ../../
          done
          echo ""
          echo "Suite: $PASS passed, $FAIL failed, $SKIP skipped (of $TOTAL)"
          if [ "$FAIL" -ne 0 ]; then
            echo "Failed:$FAILURES"
            exit 1
          fi

  regression:
    name: Regression tests
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Clone Python redo (for comparison)
        run: git clone --depth 1 https://github.com/apenwarr/redo.git /tmp/apenwarr-redo
      - name: Set up Python redo version shim
        run: |
          mkdir -p /tmp/apenwarr-redo/redo/version
          printf "COMMIT = 'test'\nTAG = 'test-0.0'\nDATE = '2024-01-01'\n" \
            > /tmp/apenwarr-redo/redo/version/_version.py
      - name: Run regression tests
        run: cargo test --test target_dir_collision -- --test-threads=1

  equivalence:
    name: Equivalence tests
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
      - name: Clone Python redo (for comparison)
        run: git clone --depth 1 https://github.com/apenwarr/redo.git /tmp/apenwarr-redo
      - name: Set up Python redo version shim
        run: |
          mkdir -p /tmp/apenwarr-redo/redo/version
          printf "COMMIT = 'test'\nTAG = 'test-0.0'\nDATE = '2024-01-01'\n" \
            > /tmp/apenwarr-redo/redo/version/_version.py
      - name: Run equivalence tests
        run: cargo test --test equivalence -- --test-threads=1
